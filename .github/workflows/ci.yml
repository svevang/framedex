name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.12"

      - name: Install dev + test deps
        run: uv sync --locked --only-group dev --only-group test

      - name: ruff check
        run: uv run --no-sync ruff check src/framedex tests

      - name: ruff format
        run: uv run --no-sync ruff format --check src/framedex tests

      - name: mypy
        run: uv run --no-sync mypy src/framedex tests --ignore-missing-imports

      - name: pytest
        run: uv run --no-sync pytest
